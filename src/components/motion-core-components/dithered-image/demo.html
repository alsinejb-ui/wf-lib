<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dithered Image | Motion Core</title>
    <link rel="stylesheet" href="./dithered-image.css" />
    <style>
      html, body { margin: 0; background: #111; color: #fff; }
      [data-component="dithered-image"] { width: 100%; height: 100svh; }
      .mc-console { position: fixed; bottom: 1rem; left: 1rem; max-width: 320px; padding: 1rem; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-family: monospace; font-size: 0.75rem; z-index: 10; }
      .mc-console h3 { margin: 0 0 0.75rem; font-size: 0.8rem; }
      .mc-console label { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; }
      .mc-console input[type="range"] { width: 120px; accent-color: #fff; }
      .mc-console select { padding: 0.25rem; background: #222; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; color: #fff; cursor: pointer; }
      .mc-console .value { min-width: 2rem; text-align: right; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div data-component="dithered-image" data-di-algo="bayer" data-di-level="0.5">
      <div data-di-container>
        <img data-di-image src="../ascii-renderer/public/daisy.png" alt="" />
      </div>
    </div>

    <aside class="mc-console" aria-label="Contrôles">
      <h3>Console</h3>
      <label>
        <span>Algo</span>
        <select id="di-algo">
          <option value="bayer">Bayer</option>
          <option value="atkinson">Atkinson</option>
        </select>
      </label>
      <label>
        <span>Level</span>
        <input type="range" id="di-level" min="0" max="100" value="50" />
        <span class="value" id="di-level-value">0.5</span>
      </label>
    </aside>

    <script type="module" src="./dithered-image.js"></script>
    <script type="module">
      import { initDitheredImage } from "./dithered-image.js";
      const root = document.querySelector('[data-component="dithered-image"]');
      const algoSelect = document.getElementById("di-algo");
      const levelInput = document.getElementById("di-level");
      const levelValue = document.getElementById("di-level-value");

      function apply() {
        root.setAttribute("data-di-algo", algoSelect.value);
        root.setAttribute("data-di-level", (levelInput.value / 100).toFixed(2));
        levelValue.textContent = (levelInput.value / 100).toFixed(2);
        initDitheredImage(root);
      }

      algoSelect.addEventListener("change", apply);
      levelInput.addEventListener("input", apply);
      apply();
    </script>
  </body>
</html>
