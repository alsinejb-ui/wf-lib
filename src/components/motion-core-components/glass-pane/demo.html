<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Pane | Motion Core</title>
    <link rel="stylesheet" href="./glass-pane.css" />
    <style>
      html, body { margin: 0; background: #111; color: #fff; }
      [data-component="glass-pane"] { width: 100%; height: 100svh; }
      .mc-console { position: fixed; bottom: 1rem; left: 1rem; max-width: 320px; padding: 1rem; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-family: monospace; font-size: 0.75rem; z-index: 10; }
      .mc-console h3 { margin: 0 0 0.75rem; font-size: 0.8rem; }
      .mc-console label { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; }
      .mc-console input[type="range"] { width: 120px; accent-color: #fff; }
      .mc-console .value { min-width: 3rem; text-align: right; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div data-component="glass-pane" data-gp-strength="0.08">
      <div data-gp-container>
        <img data-gp-image src="../ascii-renderer/public/daisy.png" alt="" />
      </div>
    </div>
    <aside class="mc-console" aria-label="Contrôles">
      <h3>Console</h3>
      <label><span>Strength</span><input type="range" id="gp-strength" min="1" max="20" value="8" /><span class="value" id="gp-strength-value">0.08</span></label>
    </aside>
    <script type="module" src="./glass-pane.js"></script>
    <script type="module">
      import { initGlassPane } from "./glass-pane.js";
      const root = document.querySelector('[data-component="glass-pane"]');
      const strengthInput = document.getElementById("gp-strength");
      const strengthValue = document.getElementById("gp-strength-value");
      function apply() { const v = strengthInput.value / 100; root.setAttribute("data-gp-strength", v.toFixed(2)); strengthValue.textContent = v.toFixed(2); initGlassPane(root); }
      strengthInput.addEventListener("input", apply);
      apply();
    </script>
  </body>
</html>
