<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnetic | Motion Core</title>
    <link rel="stylesheet" href="./magnetic.css" />
    <style>
      html, body { margin: 0; background: #111; color: #fff; min-height: 100vh; }
      [data-magnetic-item] { padding: 1rem 2rem; background: #333; border-radius: 8px; cursor: pointer; }
      .mc-console { position: fixed; bottom: 1rem; left: 1rem; max-width: 320px; padding: 1rem; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-family: monospace; font-size: 0.75rem; z-index: 10; }
      .mc-console h3 { margin: 0 0 0.75rem; font-size: 0.8rem; }
      .mc-console label { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; }
      .mc-console input[type="range"] { width: 120px; accent-color: #fff; }
      .mc-console .value { min-width: 3rem; text-align: right; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div data-component="magnetic" data-magnetic-strength="0.3">
      <button data-magnetic-item>Bouton 1</button>
      <button data-magnetic-item>Bouton 2</button>
      <button data-magnetic-item>Bouton 3</button>
    </div>
    <aside class="mc-console" aria-label="Contrôles">
      <h3>Console</h3>
      <label><span>Strength</span><input type="range" id="mag-strength" min="0" max="100" value="30" /><span class="value" id="mag-strength-value">0.3</span></label>
    </aside>
    <script type="module" src="./magnetic.js"></script>
    <script type="module">
      import { initMagnetic } from "./magnetic.js";
      const root = document.querySelector('[data-component="magnetic"]');
      const strengthInput = document.getElementById("mag-strength");
      const strengthValue = document.getElementById("mag-strength-value");
      function apply() { const v = strengthInput.value / 100; root.setAttribute("data-magnetic-strength", v.toFixed(2)); strengthValue.textContent = v.toFixed(2); initMagnetic(root); }
      strengthInput.addEventListener("input", apply);
      apply();
    </script>
  </body>
</html>
