<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Loop | Motion Core</title>
    <link rel="stylesheet" href="./text-loop.css" />
    <style>
      html, body { margin: 0; background: #111; color: #fff; padding: 4rem; font-size: 2rem; }
      .mc-console { position: fixed; bottom: 1rem; left: 1rem; max-width: 320px; padding: 1rem; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-family: monospace; font-size: 0.75rem; z-index: 10; }
      .mc-console h3 { margin: 0 0 0.75rem; font-size: 0.8rem; }
      .mc-console label { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; }
      .mc-console input[type="range"] { width: 120px; accent-color: #fff; }
      .mc-console .value { min-width: 3rem; text-align: right; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div data-component="text-loop" data-tl-duration="2000" data-tl-gap="500">
      <div data-tl-container>
        <span data-tl-item>Design</span>
        <span data-tl-item>Motion</span>
        <span data-tl-item>Creative</span>
      </div>
    </div>
    <aside class="mc-console" aria-label="Contrôles">
      <h3>Console</h3>
      <label><span>Duration</span><input type="range" id="tl-duration" min="500" max="5000" value="2000" /><span class="value" id="tl-duration-value">2s</span></label>
      <label><span>Gap</span><input type="range" id="tl-gap" min="0" max="2000" value="500" /><span class="value" id="tl-gap-value">500ms</span></label>
    </aside>
    <script type="module" src="./text-loop.js"></script>
    <script type="module">
      import { initTextLoop } from "./text-loop.js";
      const root = document.querySelector('[data-component="text-loop"]');
      const durationInput = document.getElementById("tl-duration");
      const gapInput = document.getElementById("tl-gap");
      function apply() { root.setAttribute("data-tl-duration", durationInput.value); root.setAttribute("data-tl-gap", gapInput.value); document.getElementById("tl-duration-value").textContent = (durationInput.value/1000).toFixed(1) + "s"; document.getElementById("tl-gap-value").textContent = gapInput.value + "ms"; initTextLoop(root); }
      durationInput.addEventListener("input", apply);
      gapInput.addEventListener("input", apply);
      apply();
    </script>
  </body>
</html>
