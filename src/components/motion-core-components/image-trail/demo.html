<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Trail | Motion Core</title>
    <link rel="stylesheet" href="./image-trail.css" />
    <style>
      html, body { margin: 0; background: #111; color: #fff; min-height: 100vh; }
      [data-it-container] { padding: 4rem; }
      .mc-console { position: fixed; bottom: 1rem; left: 1rem; max-width: 320px; padding: 1rem; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-family: monospace; font-size: 0.75rem; z-index: 10; }
      .mc-console h3 { margin: 0 0 0.75rem; font-size: 0.8rem; }
      .mc-console label { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; }
      .mc-console input[type="range"] { width: 120px; accent-color: #fff; }
      .mc-console .value { min-width: 2rem; text-align: right; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div data-component="image-trail" data-it-size="80" data-it-count="8">
      <div data-it-container>
        <p>Déplacez la souris pour voir la traînée.</p>
        <img data-it-image src="../ascii-renderer/public/daisy.png" alt="" style="display:none" />
      </div>
    </div>
    <aside class="mc-console" aria-label="Contrôles">
      <h3>Console</h3>
      <label><span>Size</span><input type="range" id="it-size" min="20" max="200" value="80" /><span class="value" id="it-size-value">80</span></label>
      <label><span>Count</span><input type="range" id="it-count" min="2" max="20" value="8" /><span class="value" id="it-count-value">8</span></label>
    </aside>
    <script type="module" src="./image-trail.js"></script>
    <script type="module">
      import { initImageTrail } from "./image-trail.js";
      const root = document.querySelector('[data-component="image-trail"]');
      const sizeInput = document.getElementById("it-size");
      const countInput = document.getElementById("it-count");
      function apply() { root.setAttribute("data-it-size", sizeInput.value); root.setAttribute("data-it-count", countInput.value); document.getElementById("it-size-value").textContent = sizeInput.value; document.getElementById("it-count-value").textContent = countInput.value; initImageTrail(root); }
      sizeInput.addEventListener("input", apply);
      countInput.addEventListener("input", apply);
      apply();
    </script>
  </body>
</html>
