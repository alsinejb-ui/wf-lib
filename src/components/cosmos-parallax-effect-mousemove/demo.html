<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmos Parallax Effect | Demo</title>
    <link rel="stylesheet" href="./cosmos-parallax-effect-mousemove.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div
      data-component="cosmos-parallax-effect-mousemove"
      data-cosmos-items='[
        {"img":"../elementis-scroll/public/img1.jpg","icon":"◎","link":"#","parallaxSpeed":0.065},
        {"img":"../elementis-scroll/public/img2.jpg","icon":"◉","link":"#","parallaxSpeed":0.05},
        {"img":"../elementis-scroll/public/img3.jpg","icon":"◍","link":"#","parallaxSpeed":0.08},
        {"img":"../elementis-scroll/public/img4.jpg","icon":"◌","link":"#","parallaxSpeed":0.1},
        {"img":"../elementis-scroll/public/img5.jpg","icon":"◈","link":"#","parallaxSpeed":0.07},
        {"img":"../fractal-glass-effect/public/hero.jpg","icon":"◇","link":"#","parallaxSpeed":0.085},
        {"img":"../fractal-glass-effect/public/hero2.jpg","icon":"◆","link":"#","parallaxSpeed":0.06},
        {"img":"../fractal-glass-effect/public/hero3.jpg","icon":"✦","link":"#","parallaxSpeed":0.04},
        {"img":"../fractal-glass-effect/public/hero4.jpg","icon":"✧","link":"#","parallaxSpeed":0.1},
        {"img":"../elementis-scroll/public/img1.jpg","icon":"✶","link":"#","parallaxSpeed":0.065}
      ]'
    >
      <div data-cosmos-header>
        <h1>Bring order to your <br />creative universe</h1>
        <button type="button">Join Waitlist</button>
      </div>
      <div data-cosmos-gallery></div>
    </div>

    <script type="module" src="./cosmos-parallax-effect-mousemove.js"></script>
  </body>
</html>
