<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>svg-image-hover — aperçu doc (1 carte)</title>
    <link rel="stylesheet" href="./svg-image-hover.css" />
    <style>
      /* Aperçu iframe doc uniquement : section seule, pas de scroll */
      :root {
        --card-1-stroke: #e67339;
        --card-base-stroke: #e0e0e0;
        --svg-hover-copy: #000;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        margin: 0;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }

      /* 15 % haut + 70 % zone composant + 15 % bas (pourcentages = hauteur du viewport iframe) */
      body::before,
      body::after {
        content: "";
        flex: 0 0 15%;
        min-height: 0;
      }

      section[data-component="svg-image-hover"] {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 clamp(0.75rem, 3vw, 1.5rem);
      }

      .card-container {
        width: min(100%, min(70vh, 52vw));
        aspect-ratio: 1;
        max-height: 100%;
        border-radius: 1rem;
      }

      #card-1 .svg-stroke-1 svg path {
        stroke: var(--card-1-stroke);
      }

      .card-container .svg-stroke-2 svg path {
        stroke: var(--card-base-stroke);
      }

      h3 {
        font-size: clamp(1.25rem, 3.5vw, 2rem);
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <section data-component="svg-image-hover">
      <div class="card-container" id="card-1" data-svg-hover-card tabindex="0">
        <div class="card-img">
          <img src="./public/img1.jpg" alt="" />
        </div>
        <div class="svg-stroke svg-stroke-1">
          <svg
            width="2453"
            height="2273"
            viewBox="0 0 2453 2273"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M227.549 1818.76C227.549 1818.76 406.016 2207.75 569.049 2130.26C843.431 1999.85 -264.104 1002.3 227.549 876.262C552.918 792.849 773.647 2456.11 1342.05 2130.26C1885.43 1818.76 14.9644 455.772 760.548 137.262C1342.05 -111.152 1663.5 2266.35 2209.55 1972.76C2755.6 1679.18 1536.63 384.467 1826.55 137.262C2013.5 -22.1463 2209.55 381.262 2209.55 381.262"
              stroke="#FE5E41"
              stroke-width="200"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <div class="svg-stroke svg-stroke-2">
          <svg
            width="2250"
            height="2535"
            viewBox="0 0 2250 2535"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M1661.28 2255.51C1661.28 2255.51 2311.09 1960.37 2111.78 1817.01C1944.47 1696.67 718.456 2870.17 499.781 2255.51C308.969 1719.17 2457.51 1613.83 2111.78 963.512C1766.05 313.198 427.949 2195.17 132.281 1455.51C-155.219 736.292 2014.78 891.514 1708.78 252.012C1437.81 -314.29 369.471 909.169 132.281 566.512C18.1772 401.672 244.781 193.012 244.781 193.012"
              stroke="#6E44FF"
              stroke-width="200"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <div class="card-title">
          <h3 data-svg-hover-title>Synthetic Silhouette</h3>
        </div>
      </div>
    </section>
    <script type="module" src="./svg-image-hover.js"></script>
  </body>
</html>
