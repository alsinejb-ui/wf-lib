<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Image Hover Effect | Demo</title>
    <link rel="stylesheet" href="./svg-image-hover.css" />
    <style>
      /* Styles demo uniquement — ne pas inclure dans le build composant */
      @import url("https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap");

      :root {
        --card-1-stroke: #e67339;
        --card-2-stroke: #a66363;
        --card-3-stroke: #eb3828;
        --card-4-stroke: #a6a09d;
        --card-5-stroke: #99938a;
        --card-6-stroke: #5f7c98;
        --card-base-stroke: #e0e0e0;
        --svg-hover-copy: #000;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Google Sans", sans-serif;
      }

      h1 {
        font-size: clamp(3rem, 5vw, 7rem);
        font-weight: 500;
        line-height: 1.25;
        letter-spacing: -0.05rem;
      }

      h3 {
        font-size: clamp(2rem, 2.5vw, 3rem);
        font-weight: 450;
        line-height: 1.25;
        letter-spacing: -0.025rem;
      }

      header,
      footer {
        width: 100%;
        padding: 15rem 2rem;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .row {
        width: 100%;
        padding: 0 1rem;
        margin-bottom: 1rem;
        display: flex;
        gap: 1rem;
      }

      /* Layout card — hors composant */
      .card-container {
        flex: 1;
        aspect-ratio: 1;
        border-radius: 1rem;
      }

      /* Couleurs de stroke par card (demo) */
      #card-1 .svg-stroke-1 svg path { stroke: var(--card-1-stroke); }
      #card-2 .svg-stroke-1 svg path { stroke: var(--card-2-stroke); }
      #card-3 .svg-stroke-1 svg path { stroke: var(--card-3-stroke); }
      #card-4 .svg-stroke-1 svg path { stroke: var(--card-4-stroke); }
      #card-5 .svg-stroke-1 svg path { stroke: var(--card-5-stroke); }
      #card-6 .svg-stroke-1 svg path { stroke: var(--card-6-stroke); }
      .card-container .svg-stroke-2 svg path { stroke: var(--card-base-stroke); }

      @media (max-width: 1000px) {
        .row { flex-direction: column; }
      }
    </style>
  </head>
